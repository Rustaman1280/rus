<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>IT Club | Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --yellow: #f7d501;
      --indigo: #4e5a92;
      --orange: #f53701;
      --mint: #3eb07c;
      --bg: #0c0d14;
      --text: #f8f8fb;
      --muted: #b8bac8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: "Space Grotesk", "Helvetica Neue", Arial, sans-serif;
      display: flex;
      flex-direction: column;
      padding: 0;
      position: relative;
    }

    /* Animated gradient background */
    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .bg-glow::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: 
        radial-gradient(circle at 20% 10%, rgba(247, 213, 1, 0.15), transparent 35%),
        radial-gradient(circle at 80% 20%, rgba(62, 176, 124, 0.18), transparent 30%),
        radial-gradient(circle at 70% 80%, rgba(78, 90, 146, 0.2), transparent 35%),
        radial-gradient(circle at 30% 90%, rgba(245, 55, 1, 0.12), transparent 30%);
      animation: bgPulse 12s ease-in-out infinite;
    }

    @keyframes bgPulse {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-3%, -3%) scale(1.05); }
    }

    /* Grid overlay */
    .grid-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(0,0,0,0.5), transparent);
      z-index: 1;
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 48px 24px 32px;
      max-width: 100%;
      width: 100%;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 40px;
    }

    .avatar {
      width: 100px;
      height: 100px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--yellow), var(--orange));
      padding: 4px;
      box-shadow: 
        0 0 40px rgba(247, 213, 1, 0.3),
        0 0 80px rgba(245, 55, 1, 0.15);
      animation: glowPulse 4s ease-in-out infinite;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: var(--bg);
      display: block;
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 40px rgba(247, 213, 1, 0.3), 0 0 80px rgba(245, 55, 1, 0.15); }
      50% { box-shadow: 0 0 50px rgba(247, 213, 1, 0.45), 0 0 100px rgba(245, 55, 1, 0.25); }
    }

    header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--text), var(--yellow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
      max-width: 300px;
      margin: 0 auto;
    }

    /* Links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 50px;
      padding: 14px 20px 14px 14px;
      text-decoration: none;
      color: var(--text);
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .link-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50px;
      padding: 1px;
      background: linear-gradient(135deg, transparent, rgba(255,255,255,0.1), transparent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .link-card:active {
      transform: scale(0.98);
      background: rgba(255, 255, 255, 0.08);
    }

    .link-card:active::before {
      opacity: 1;
    }

    /* Glow accent per card */
    .link-card.discord { box-shadow: inset 0 0 30px rgba(78, 90, 146, 0.15); }
    .link-card.discord:active { box-shadow: inset 0 0 40px rgba(78, 90, 146, 0.3), 0 0 30px rgba(78, 90, 146, 0.2); }

    .link-card.tiktok { box-shadow: inset 0 0 30px rgba(62, 176, 124, 0.1); }
    .link-card.tiktok:active { box-shadow: inset 0 0 40px rgba(62, 176, 124, 0.25), 0 0 30px rgba(62, 176, 124, 0.15); }

    .link-card.instagram { box-shadow: inset 0 0 30px rgba(245, 55, 1, 0.1); }
    .link-card.instagram:active { box-shadow: inset 0 0 40px rgba(245, 55, 1, 0.25), 0 0 30px rgba(245, 55, 1, 0.15); }

    .link-card.website { box-shadow: inset 0 0 30px rgba(247, 213, 1, 0.1); }
    .link-card.website:active { box-shadow: inset 0 0 40px rgba(247, 213, 1, 0.25), 0 0 30px rgba(247, 213, 1, 0.15); }

    .icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      flex-shrink: 0;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .text {
      flex: 1;
      min-width: 0;
    }

    .text h3 {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 2px;
      letter-spacing: -0.01em;
    }

    .text span {
      color: var(--muted);
      font-size: 13px;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .arrow {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      opacity: 0.4;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .link-card:active .arrow {
      opacity: 0.8;
      transform: translateX(3px);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 24px 0 16px;
      color: var(--muted);
      font-size: 12px;
      opacity: 0.7;
    }

    footer span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    /* Floating particles */
    .particle {
      position: fixed;
      width: 4px;
      height: 4px;
      background: var(--yellow);
      border-radius: 50%;
      opacity: 0.4;
      pointer-events: none;
      z-index: 1;
      animation: float 20s linear infinite;
    }

    .particle:nth-child(2) { left: 15%; top: 20%; background: var(--mint); animation-delay: -5s; animation-duration: 25s; }
    .particle:nth-child(3) { left: 85%; top: 30%; background: var(--indigo); animation-delay: -10s; animation-duration: 22s; }
    .particle:nth-child(4) { left: 70%; top: 70%; background: var(--orange); animation-delay: -15s; animation-duration: 28s; }
    .particle:nth-child(5) { left: 25%; top: 80%; background: var(--yellow); animation-delay: -8s; animation-duration: 24s; width: 3px; height: 3px; }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.4; }
      90% { opacity: 0.4; }
      100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="grid-overlay"></div>
  
  <!-- Floating particles -->
  <div class="particle" style="left: 10%; top: 50%;"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>

  <div class="container">
    <header>
      <div class="avatar">
        <!-- Ganti src dengan logo IT Club -->
        <img src="logo.png" alt="IT Club Logo" />
      </div>
      <h1>IT Club</h1>
      <p>Tech community of builders, learners & creators</p>
    </header>

    <div class="links">
      <a class="link-card discord" href="https://discord.gg/" target="_blank" rel="noreferrer">
        <div class="icon">
          <!-- Ganti src dengan icon Discord -->
          <img src="discord.png" alt="Discord" />
        </div>
        <div class="text">
          <h3>Discord</h3>
          <span>Join our community server</span>
        </div>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </a>

      <a class="link-card tiktok" href="https://www.tiktok.com/" target="_blank" rel="noreferrer">
        <div class="icon">
          <!-- Ganti src dengan icon TikTok -->
          <img src="tiktok.png" alt="TikTok" />
        </div>
        <div class="text">
          <h3>TikTok</h3>
          <span>Tips & behind the scenes</span>
        </div>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </a>

      <a class="link-card instagram" href="https://www.instagram.com/" target="_blank" rel="noreferrer">
        <div class="icon">
          <!-- Ganti src dengan icon Instagram -->
          <img src="instagram.png" alt="Instagram" />
        </div>
        <div class="text">
          <h3>Instagram</h3>
          <span>Events & highlights</span>
        </div>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </a>

      <a class="link-card website" href="https://example.com" target="_blank" rel="noreferrer">
        <div class="icon">
          <!-- Ganti src dengan icon Website -->
          <img src="g.png" alt="Website" />
        </div>
        <div class="text">
          <h3>Website</h3>
          <span>Programs & resources</span>
        </div>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </a>
    </div>

    <footer>
      <span>✦ IT Club — stay curious, build bold ✦</span>
    </footer>
  </div>
</body>
</html>
